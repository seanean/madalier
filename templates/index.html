<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title> Madalier </title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .app-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid #ccc;
            background: #f5f5f5;
        }

        .app-header button {
            padding: 0.35rem 0.65rem;
            font: inherit;
            cursor: pointer;
        }

        .app-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            min-width: 0;
        }

        .app-workspace {
            flex: 1;
            display: flex;
            flex-direction: row;
            min-height: 0;
            min-width: 0;
        }

        .diagram-panel {
            flex: 1;
            min-width: 0;
            min-height: 0;
            position: relative;
        }

        #cy {
            width: 100%;
            height: 100%;
        }

        .splitter {
            flex-shrink: 0;
            width: 6px;
            cursor: col-resize;
            background: #e0e0e0;
            border-left: 1px solid #ccc;
            border-right: 1px solid #ccc;
        }

        .splitter:hover,
        .splitter:focus-visible {
            background: #d0d0d0;
        }

        .details-pane {
            flex-shrink: 0;
            width: 300px;
            min-width: 120px;
            max-width: min(80vw, 900px);
            overflow: auto;
            background: #fafafa;
            border-left: 1px solid #ccc;
            padding: 0.75rem;
            box-sizing: border-box;
        }

        .details-pane h2 {
            margin: 0 0 0.5rem;
            font-size: 1rem;
            font-weight: 600;
        }

        .details-pane h3 {
            margin: 0 0 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
        }

        .details-placeholder {
            margin: 0;
            font-size: 0.85rem;
            color: #666;
            line-height: 1.4;
        }

        .details-error {
            margin: 0;
            font-size: 0.85rem;
            color: #a30;
        }

        .details-props {
            margin: 0;
        }

        .details-props dt {
            margin: 0.5rem 0 0.15rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #555;
            text-transform: none;
        }

        .details-props dt:first-child {
            margin-top: 0;
        }

        .details-props dd {
            margin: 0;
            font-size: 0.85rem;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .details-props pre {
            margin: 0.25rem 0 0;
            padding: 0.4rem 0.5rem;
            font-size: 0.75rem;
            line-height: 1.35;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            overflow: auto;
            max-height: 40vh;
        }

        .details-persist-message {
            font-size: 0.8rem;
            margin: 0 0 0.5rem;
            padding: 0.4rem 0.5rem;
            border-radius: 4px;
            line-height: 1.35;
        }

        .details-persist-message.is-error {
            background: #ffe8e5;
            border: 1px solid #e0a098;
            color: #6b1c12;
        }

        .details-form {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .details-field-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 0.2rem;
        }

        .details-field-control {
            width: 100%;
            box-sizing: border-box;
            font: inherit;
            padding: 0.35rem 0.45rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .details-field textarea.details-field-control {
            resize: vertical;
            min-height: 4rem;
        }

        .open-model-dialog {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 0;
            min-width: 280px;
        }

        .open-model-dialog::backdrop {
            background: rgba(0, 0, 0, 0.25);
        }

        .open-model-dialog header {
            padding: 0.65rem 0.75rem;
            border-bottom: 1px solid #e0e0e0;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .open-model-dialog .dialog-body {
            padding: 0.75rem;
            max-height: 50vh;
            overflow: auto;
        }

        .open-model-dialog ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .open-model-dialog li button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.45rem 0.5rem;
            margin-bottom: 0.25rem;
            font: inherit;
            cursor: pointer;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
        }

        .open-model-dialog li button:hover {
            background: #f0f7ff;
        }

        .open-model-dialog footer {
            padding: 0.5rem 0.75rem;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: flex-end;
        }

        .new-model-dialog {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 0;
            min-width: 320px;
        }

        .new-model-dialog::backdrop {
            background: rgba(0, 0, 0, 0.25);
        }

        .new-model-dialog header {
            padding: 0.65rem 0.75rem;
            border-bottom: 1px solid #e0e0e0;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .new-model-dialog .dialog-body {
            padding: 0.75rem;
        }

        .new-model-dialog label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
            color: #333;
        }

        .new-model-dialog input,
        .new-model-dialog textarea {
            width: 100%;
            box-sizing: border-box;
            font: inherit;
            padding: 0.4rem 0.5rem;
            margin-bottom: 0.65rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .new-model-dialog textarea {
            min-height: 3.5rem;
            resize: vertical;
        }

        .new-model-dialog .field-hint {
            font-size: 0.75rem;
            color: #666;
            margin: -0.45rem 0 0.5rem;
        }

        .new-model-dialog footer {
            padding: 0.5rem 0.75rem;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }
    </style>
    <script src="../static/cytoscape.min.js"></script>
    <script src="../static/dagre.min.js"></script>
    <script src="../static/cytoscape-dagre.min.js"></script>
    <script type="module" src="../static/main.js"></script>
</head>

<body>
    <header class="app-header" role="banner">
        <button type="button" id="new-model-btn">New model</button>
        <button type="button" id="open-model-btn">Open model</button>
        <button type="button" id="save-model-btn">Save model</button>
        <button type="button">Add entity</button>
        <button type="button">Add attribute</button>
        <button type="button">Add relationship</button>
        <button type="button">Remove selected</button>
        <button type="button">Export diagram</button>
        <button type="button">Export DDL</button>
        <button type="button">Export CSV</button>
    </header>
    <main class="app-main">
        <div class="app-workspace">
            <div class="diagram-panel">
                <div id="cy"></div>
            </div>
            <div class="splitter" role="separator" aria-orientation="vertical"
                aria-label="Resize details panel" tabindex="0"></div>
            <aside class="details-pane" aria-label="Details">
                <h2>Details</h2>
                <div id="details-content">
                    <p class="details-placeholder">Select an entity or attribute on the diagram.</p>
                </div>
            </aside>
        </div>
    </main>

    <dialog id="open-model-dialog" class="open-model-dialog" aria-labelledby="open-model-dialog-title">
        <header id="open-model-dialog-title">Open model</header>
        <div class="dialog-body">
            <ul id="open-model-list"></ul>
        </div>
        <footer>
            <button type="button" id="open-model-cancel">Cancel</button>
        </footer>
    </dialog>

    <dialog id="new-model-dialog" class="new-model-dialog" aria-labelledby="new-model-dialog-title">
        <header id="new-model-dialog-title">New model</header>
        <form class="dialog-body" id="new-model-form">
            <label for="new-model-stem">File name</label>
            <input type="text" id="new-model-stem" name="stem" required autocomplete="off"
                placeholder="e.g. customer_warehouse" pattern="[^/\\]+" maxlength="200">
            <p class="field-hint">Edits use working files (temp_&lt;name&gt;) until you click Save model, which writes data/models/&lt;name&gt;.json and layouts/&lt;name&gt;.json.</p>
            <label for="new-model-display-name">Display name (optional)</label>
            <input type="text" id="new-model-display-name" name="name" autocomplete="off" maxlength="500"
                placeholder="Defaults to file name">
            <label for="new-model-description">Description (optional)</label>
            <textarea id="new-model-description" name="description" maxlength="4000"
                placeholder="Short description"></textarea>
            <footer>
                <button type="button" id="new-model-cancel">Cancel</button>
                <button type="submit" id="new-model-submit">Create</button>
            </footer>
        </form>
    </dialog>
</body>

</html>
